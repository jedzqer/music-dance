<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐可视化</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="layout-two">
    <canvas id="canvas"></canvas>

    <div class="cover-art" id="cover-art">
        <img id="cover-img" alt="专辑图">
    </div>

    <div class="overlay" id="overlay">
        <div class="upload-panel">
            <h1>♫ 音乐可视化 ♫</h1>
            <p class="subtitle">选择一首音乐，感受节奏的视觉魅力</p>
            <div class="button-group">
                <label class="upload-btn" for="file-input">打开音乐文件</label>
                <button class="upload-btn folder-btn" id="folder-btn">打开音乐文件夹</button>
            </div>
            <input type="file" id="file-input" accept="audio/*">
            <p class="drop-hint">或拖放音频文件到页面</p>
        </div>
    </div>

    <div class="playlist-panel" id="playlist-panel">
        <div class="playlist-header">
            <h3>播放列表</h3>
            <span class="playlist-count" id="playlist-count">0 首歌曲</span>
            <button class="playlist-close" id="playlist-close">×</button>
        </div>
        <div class="playlist-content" id="playlist-content"></div>
    </div>

    <div class="progress-container" id="progress-container">
        <div class="progress-track"></div>
        <div class="progress-fill" id="progress-fill"></div>
        <div class="progress-thumb" id="progress-thumb"></div>
        <div class="progress-time-tip" id="progress-time-tip"></div>
    </div>

    <div class="lyrics-panel" id="lyrics-panel">
        <div class="lyrics-header">
            <h3>NOW PLAYING</h3>
            <span class="track-name" id="track-name">—</span>
        </div>
        <div id="lyrics-content"></div>
    </div>

    <div class="controls" id="controls">
        <button id="play-btn" title="播放 / 暂停">
            <svg class="icon icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icon icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="prev-btn" title="上一首">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="next-btn" title="下一首">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button id="playlist-btn" title="播放列表">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </button>
        <div class="vol-wrap">
            <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <input type="range" id="volume-slider" min="0" max="100" value="75">
        </div>
    </div>

    <div class="error-toast" id="error-toast"></div>

    <script type="module" src="/src/app.js"></script>
</body>
</html>
